name: Baseline Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Install dependencies
        run: |
          julia -e 'using Pkg; Pkg.add(["CSV", "DataFrames", "Plots", "ForwardDiff", "Optimisers"])'

      - name: Run baseline regression tests
        run: julia test/runtests.jl
